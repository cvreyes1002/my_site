{# {% load static %} #}

<li>
    <article class="post">
        <a href="{% url "post-detail-page" post.slug %}">
            <img src="{{ post.image.url }}" alt="{{ post.title }}">
            {% comment %} <img src="{% static "blog/images/"|add:post.image_name %}" alt="{{ post.title }}"> {% endcomment %}
        <div class="post__content">
            <h3>{{ post.title }}</h3>
            <p>
                {{ post.excerpt }}
            </p>
        </div>
        </a>
    </article>
</li>
